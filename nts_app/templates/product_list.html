{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
.product-page {
    background: #f4f4f6;
    min-height: 100vh;
    padding: 50px 0;
    font-family: 'Segoe UI', sans-serif;
}

.product-wrapper {
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

.product-title {
    font-size: 28px;
    font-weight: 700;
    color: #dc3545;
    margin-bottom: 30px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 25px;
}

.product-card {
    background: #fff;
    border-radius: 14px;
    padding: 15px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    text-align: center;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    height: 100%;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-img-box {
    width: 100%;
    height: 220px;
    background: #fafafa;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 15px;
}

.product-img-box img {
    max-width: 100%;
    max-height: 200px;
    object-fit: contain;
}

.product-name {
    font-size: 17px;
    font-weight: 600;
    color: #222;
    margin-bottom: 10px;
    min-height: 45px;
}

.product-price {
    color: #dc3545;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 15px;
}

.view-btn {
    display: inline-block;
    background: #dc3545;
    color: #fff;
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    transition: 0.3s;
}

.view-btn:hover {
    background: #bb2d3b;
    color: #fff;
    text-decoration: none;
}

.empty-box {
    text-align: center;
    padding: 60px 20px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
}

@media (max-width: 992px) {
    .product-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .product-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .product-img-box {
        height: 180px;
    }

    .product-img-box img {
        max-height: 160px;
    }
}

@media (max-width: 480px) {
    .product-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<section class="product-page">
    <div class="product-wrapper">

        <h2 class="product-title">
            <i class="fas fa-layer-group"></i> Products
        </h2>

        {% if products %}
            <div class="product-grid">
                {% for product in products %}
                    <div class="product-card">
                        <div>
                            <div class="product-img-box">
                                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                            </div>

                            <div class="product-name">{{ product.name }}</div>
                            <div class="product-price">₹ {{ product.price }}</div>
                        </div>

                        <a href="{% url 'product_detail' product.id %}" class="view-btn">
                            <i class="fas fa-eye"></i> View Details
                        </a>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <div class="empty-box">
                <h3>No Products Found</h3>
                <p>This category has no products yet.</p>
            </div>
        {% endif %}

    </div>
</section>

{% endblock %}
