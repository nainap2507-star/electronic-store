{% extends 'base.html' %}
{% load static %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
</head>
<body>

<h2>Search Results</h2>

<p>Keyword: {{ query }}</p>
<p>Category: {{ category }}</p>

{% if results %}
    <ul>
        {% for item in results %}
            <li>{{ item }}</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No results found</p>
{% endif %}

</body>
</html>
{% endblock %}
