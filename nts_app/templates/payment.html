{% extends 'base.html' %}
{% block content %}

<div style="max-width:600px;margin:50px auto;text-align:center;">
    <h2>Complete Your Payment</h2>
    <p>Order ID: {{ order.id }}</p>
    <p>Total: ₹{{ total }}</p>
    <button id="rzp-button1" style="padding:12px 30px;background:#e63946;color:#fff;border:none;border-radius:8px;">
        Pay Now
    </button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
var options = {
    "key": "{{ razorpay_key }}",
    "amount": "{{ order.total_price|floatformat:2 }}00",
    "currency": "INR",
    "name": "N Tech Store",
    "description": "Order Payment",
    "order_id": "{{ order.razorpay_order_id }}",
    "handler": function (response){
        var form = document.createElement("form");
        form.method = "POST";
        form.action = "{% url 'payment_success' %}";

        var csrf = document.createElement("input");
        csrf.type = "hidden";
        csrf.name = "csrfmiddlewaretoken";
        csrf.value = "{{ csrf_token }}";
        form.appendChild(csrf);

        var payment_id = document.createElement("input");
        payment_id.type = "hidden";
        payment_id.name = "razorpay_payment_id";
        payment_id.value = response.razorpay_payment_id;
        form.appendChild(payment_id);

        var order_id = document.createElement("input");
        order_id.type = "hidden";
        order_id.name = "razorpay_order_id";
        order_id.value = response.razorpay_order_id;
        form.appendChild(order_id);

        var signature = document.createElement("input");
        signature.type = "hidden";
        signature.name = "razorpay_signature";
        signature.value = response.razorpay_signature;
        form.appendChild(signature);

        document.body.appendChild(form);
        form.submit();
    },
    "prefill": {
        "name": "{{ order.fullname }}",
        "email": "{{ order.email }}",
        "contact": "{{ order.phone }}"
    },
    "theme": {
        "color": "#e63946"
    }
};

var rzp1 = new Razorpay(options);
document.getElementById('rzp-button1').onclick = function(e){
    rzp1.open();
    e.preventDefault();
}
</script>

{% endblock %}
