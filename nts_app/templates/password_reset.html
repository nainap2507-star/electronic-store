<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            font-family: Arial, sans-serif;
        }

        .reset-box {
            width: 360px;
            padding: 30px 25px;
            border: 2px solid #d92323;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(217, 35, 35, 0.3);
        }

        .reset-box h2 {
            text-align: center;
            color: #d92323;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #d92323;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #d92323;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .form-group input:focus {
            background: #eef4ff;
        }

        .btn-reset {
            width: 100%;
            padding: 12px;
            background: #d92323;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-reset:hover {
            background: #b71c1c;
        }

        .back-login {
            text-align: center;
            margin-top: 15px;
        }

        .back-login a {
            text-decoration: none;
            color: #d92323;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="reset-box">
    <h2>Reset Password</h2>

    <form method="post">
        <!-- Django CSRF -->
        <!-- {% csrf_token %} -->

        <div class="form-group">
            <label>New Password</label>
            <input type="password" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="btn-reset">RESET PASSWORD</button>

        <div class="back-login">
            <a href="#">Back to Login</a>
        </div>
    </form>
</div>

</body>
</html>
